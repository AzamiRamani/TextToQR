<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Text → QR Splitter</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f6f3;
    --surface: #ffffff;
    --border: #e2e0da;
    --border-strong: #c8c5be;
    --text: #1a1917;
    --text-muted: #6b6860;
    --text-faint: #9e9c97;
    --accent: #2d5be3;
    --accent-light: #eef1fd;
    --accent-dark: #1e3fa0;
    --mono: 'JetBrains Mono', 'Fira Mono', 'Courier New', monospace;
    --sans: 'Inter', system-ui, -apple-system, sans-serif;
    --radius: 10px;
    --radius-lg: 16px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #111110;
      --surface: #1c1c1a;
      --border: #2e2d2a;
      --border-strong: #45443f;
      --text: #f0ede8;
      --text-muted: #9e9c97;
      --text-faint: #6b6860;
      --accent: #5b7ef5;
      --accent-light: #1a2045;
      --accent-dark: #7d9bf8;
    }
  }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }

  .page {
    max-width: 860px;
    margin: 0 auto;
  }

  header {
    margin-bottom: 2.5rem;
  }

  .wordmark {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 1rem;
  }

  h1 {
    font-size: clamp(28px, 5vw, 42px);
    font-weight: 700;
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin-bottom: 0.5rem;
  }

  h1 span {
    color: var(--accent);
  }

  .subtitle {
    font-size: 15px;
    color: var(--text-muted);
    line-height: 1.6;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.5rem;
    margin-bottom: 1.25rem;
  }

  .card-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 0.75rem;
  }

  textarea {
    width: 100%;
    min-height: 180px;
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.65;
    color: var(--text);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    resize: vertical;
    outline: none;
    transition: border-color 0.15s;
  }

  textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-light);
  }

  textarea::placeholder { color: var(--text-faint); }

  .controls {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    margin-top: 1rem;
  }

  .field {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .field label {
    font-size: 13px;
    color: var(--text-muted);
    white-space: nowrap;
  }

  input[type="number"] {
    width: 80px;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    text-align: center;
    color: var(--text);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 7px 10px;
    outline: none;
    transition: border-color 0.15s;
  }

  input[type="number"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-light);
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 600;
    padding: 8px 18px;
    border-radius: var(--radius);
    border: none;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }

  .btn:active { transform: scale(0.97); }

  .btn-primary {
    background: var(--accent);
    color: #fff;
  }

  .btn-primary:hover { background: var(--accent-dark); }

  .btn-ghost {
    background: var(--bg);
    color: var(--text-muted);
    border: 1px solid var(--border);
  }

  .btn-ghost:hover { border-color: var(--border-strong); color: var(--text); }

  .btn-sm {
    font-size: 12px;
    padding: 6px 12px;
  }

  .stats {
    display: none;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 1.25rem;
  }

  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
  }

  .stat-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 4px;
  }

  .stat-value {
    font-family: var(--mono);
    font-size: 24px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.02em;
  }

  .output-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
  }

  .output-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
  }

  .qr-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
    gap: 1rem;
  }

  .qr-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1rem;
    display: flex;
    flex-direction: column;
    gap: 10px;
    transition: border-color 0.15s;
  }

  .qr-card:hover { border-color: var(--border-strong); }

  .qr-card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .qr-index {
    font-size: 12px;
    font-weight: 700;
    color: var(--accent);
    background: var(--accent-light);
    padding: 3px 8px;
    border-radius: 6px;
    font-family: var(--mono);
  }

  .qr-chars {
    font-size: 11px;
    color: var(--text-faint);
    font-family: var(--mono);
  }

  .qr-canvas-wrap {
    display: flex;
    justify-content: center;
    background: #fff;
    border-radius: var(--radius);
    padding: 10px;
    border: 1px solid var(--border);
  }

  .qr-canvas-wrap canvas {
    display: block;
    max-width: 100%;
  }

  .qr-preview {
    font-size: 11px;
    color: var(--text-faint);
    font-family: var(--mono);
    line-height: 1.5;
    max-height: 56px;
    overflow: hidden;
    padding-top: 8px;
    border-top: 1px solid var(--border);
  }

  .empty-state {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--text-faint);
    font-size: 14px;
    border: 1px dashed var(--border);
    border-radius: var(--radius-lg);
  }

  .empty-icon {
    font-size: 32px;
    margin-bottom: 0.75rem;
    opacity: 0.4;
  }

  .hint {
    font-size: 12px;
    color: var(--text-faint);
    margin-top: 8px;
  }

  @media (max-width: 480px) {
    .stats { grid-template-columns: repeat(3, 1fr); }
    .stat-value { font-size: 18px; }
  }
</style>
</head>
<body>
<div class="page">

  <header>
    <div class="wordmark">QR Splitter</div>
    <h1>Text <span>→</span> QR codes</h1>
    <p class="subtitle">Paste long text and split it into scannable QR codes — paragraphs are never cut in the middle.</p>
  </header>

  <div class="card">
    <div class="card-label">Your text</div>
    <textarea id="inputText" placeholder="Paste or type your text here…" spellcheck="false"></textarea>
    <div class="controls">
      <div class="field">
        <label for="maxChars">Max chars per QR</label>
        <input type="number" id="maxChars" value="800" min="50" max="1500" step="50" />
      </div>
      <button class="btn btn-primary" onclick="generate()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="17" width="3" height="3"/><rect x="19" y="14" width="3" height="3"/><rect x="19" y="19" width="3" height="3"/></svg>
        Generate QR codes
      </button>
      <button class="btn btn-ghost" id="downloadBtn" onclick="downloadAll()" style="display:none;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Download all
      </button>
      <p class="hint">Tip: press Ctrl + Enter to generate</p>
    </div>
  </div>

  <div class="stats" id="stats">
    <div class="stat"><div class="stat-label">Characters</div><div class="stat-value" id="statChars">—</div></div>
    <div class="stat"><div class="stat-label">QR codes</div><div class="stat-value" id="statCodes">—</div></div>
    <div class="stat"><div class="stat-label">Paragraphs</div><div class="stat-value" id="statParas">—</div></div>
  </div>

  <div id="outputWrap">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">⬛</div>
      <div>Your QR codes will appear here</div>
    </div>
    <div id="outputHeader" style="display:none;" class="output-header">
      <div class="output-title" id="outputTitle"></div>
    </div>
    <div class="qr-grid" id="output"></div>
  </div>

</div>

<script>
function splitTextIntoParagraphChunks(text, maxChars) {
  const paragraphs = text.split(/\n\s*\n/).map(p => p.trim()).filter(p => p.length > 0);
  const chunks = [];
  let current = '';

  for (let i = 0; i < paragraphs.length; i++) {
    const para = paragraphs[i];
    const separator = current.length > 0 ? '\n\n' : '';
    const candidate = current + separator + para;

    if (para.length > maxChars) {
      if (current.length > 0) { chunks.push(current.trim()); current = ''; }
      const sentences = para.match(/[^.!?]+[.!?]+[\s]*/g) || [para];
      let sentChunk = '';
      for (const sent of sentences) {
        if ((sentChunk + sent).length > maxChars && sentChunk.length > 0) {
          chunks.push(sentChunk.trim());
          sentChunk = sent;
        } else {
          sentChunk += sent;
        }
      }
      if (sentChunk.trim()) current = sentChunk.trim();
    } else if (candidate.length > maxChars) {
      if (current.length > 0) chunks.push(current.trim());
      current = para;
    } else {
      current = candidate;
    }
  }
  if (current.trim()) chunks.push(current.trim());
  return chunks;
}

function makeQR(text, size) {
  const canvas = document.createElement('canvas');
  try {
    new QRious({ element: canvas, value: text, size: size, level: 'M', background: '#ffffff', foreground: '#000000' });
    return { canvas, error: null };
  } catch(e) {
    return { canvas: null, error: e.message };
  }
}

function generate() {
  const text = document.getElementById('inputText').value.trim();
  const maxChars = parseInt(document.getElementById('maxChars').value) || 800;
  const output = document.getElementById('output');
  output.innerHTML = '';

  if (!text) {
    document.getElementById('emptyState').style.display = 'block';
    document.getElementById('emptyState').innerHTML = '<div class="empty-icon">⬛</div><div>Please enter some text first.</div>';
    document.getElementById('outputHeader').style.display = 'none';
    document.getElementById('stats').style.display = 'none';
    document.getElementById('downloadBtn').style.display = 'none';
    return;
  }

  document.getElementById('emptyState').style.display = 'none';

  const chunks = splitTextIntoParagraphChunks(text, maxChars);
  const paragraphs = text.split(/\n\s*\n/).filter(p => p.trim().length > 0);

  document.getElementById('statChars').textContent = text.length.toLocaleString();
  document.getElementById('statCodes').textContent = chunks.length;
  document.getElementById('statParas').textContent = paragraphs.length;
  document.getElementById('stats').style.display = 'grid';
  document.getElementById('downloadBtn').style.display = chunks.length > 0 ? 'inline-flex' : 'none';
  document.getElementById('outputHeader').style.display = 'flex';
  document.getElementById('outputTitle').textContent = chunks.length + ' QR code' + (chunks.length !== 1 ? 's' : '') + ' generated';

  chunks.forEach((chunk, idx) => {
    const card = document.createElement('div');
    card.className = 'qr-card';

    const header = document.createElement('div');
    header.className = 'qr-card-header';
    header.innerHTML = `<span class="qr-index">${idx + 1} / ${chunks.length}</span><span class="qr-chars">${chunk.length} chars</span>`;

    const qrWrap = document.createElement('div');
    qrWrap.className = 'qr-canvas-wrap';
    qrWrap.id = `qr-${idx}`;

    const preview = document.createElement('div');
    preview.className = 'qr-preview';
    preview.textContent = chunk.substring(0, 110) + (chunk.length > 110 ? '…' : '');

    const dlBtn = document.createElement('button');
    dlBtn.className = 'btn btn-ghost btn-sm';
    dlBtn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Download';
    dlBtn.onclick = () => downloadOne(idx);

    card.appendChild(header);
    card.appendChild(qrWrap);
    card.appendChild(preview);
    card.appendChild(dlBtn);
    output.appendChild(card);

    setTimeout(() => {
      const { canvas, error } = makeQR(chunk, 190);
      if (error || !canvas) {
        qrWrap.innerHTML = `<div style="font-size:12px;color:#c0392b;padding:10px;text-align:center;">Could not encode — try reducing max chars.</div>`;
      } else {
        qrWrap.appendChild(canvas);
      }
    }, idx * 30);
  });
}

function downloadOne(idx) {
  const wrap = document.getElementById(`qr-${idx}`);
  const canvas = wrap && wrap.querySelector('canvas');
  if (!canvas) return;
  const link = document.createElement('a');
  link.download = `qr-chunk-${idx + 1}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

function downloadAll() {
  const cards = document.querySelectorAll('[id^="qr-"]');
  cards.forEach((wrap, idx) => {
    const canvas = wrap.querySelector('canvas');
    if (!canvas) return;
    setTimeout(() => {
      const link = document.createElement('a');
      link.download = `qr-chunk-${idx + 1}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }, idx * 200);
  });
}

document.getElementById('inputText').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && e.ctrlKey) generate();
});
</script>
</body>
</html>
